server {
  listen 80;

  # Simulate production ingress rewrite for API
  # /x402-demo/api/* -> server /*
  location ~ ^/x402-demo/api(/|$)(.*) {
    rewrite ^/x402-demo/api(/|$)(.*) /$2 break;
    proxy_pass http://server:3001;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Simulate production ingress rewrite for SPA
  # /x402-demo/* -> client /*
  location ~ ^/x402-demo(/|$)(.*) {
    rewrite ^/x402-demo(/|$)(.*) /$2 break;
    proxy_pass http://client:80;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
